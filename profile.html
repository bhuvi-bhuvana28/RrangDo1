<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-container">

  <h2>👤 My Profile</h2>

  <div class="profile-field">
    <label>Name</label>
    <input type="text" id="nameInput">
  </div>

  <div class="profile-field">
    <label>Email</label>
    <input type="email" id="emailInput">
  </div>

  <button onclick="saveProfile()" class="save-btn">Save Changes</button>

  <hr>

  <h3>📍 Saved Address</h3>
  <p id="address"></p>
  <button onclick="changeLocation()" class="location-btn">Change Location</button>

  <hr>

  <h3>📦 My Orders</h3>
  <p>No orders yet</p>

  <button onclick="logout()" class="logout-btn">Logout</button>

</div>

<script>

// load data
document.getElementById("nameInput").value =
  localStorage.getItem("userName") || "";

document.getElementById("emailInput").value =
  localStorage.getItem("currentUser") || "";

// address
let saved = JSON.parse(localStorage.getItem("userAddress"));
if(saved){
  document.getElementById("address").innerText = saved.street;
}

// save changes
function saveProfile(){
  let name = document.getElementById("nameInput").value;
  let email = document.getElementById("emailInput").value;

  localStorage.setItem("userName", name);
  localStorage.setItem("currentUser", email);

  alert("Profile updated ✅");
}

// change location
function changeLocation(){
  window.location.href = "location.html";
}

// logout
function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

</script>

</body>
</html>
