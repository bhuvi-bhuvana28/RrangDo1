<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">RrangoDoIndia</div>

  <div class="nav-buttons">
    <a href="index.html">🏠 Home</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="wishlist.html">❤️ Wishlist</a>
  </div>
</div>

<!-- CART -->
<div class="cart-container">

<h2>🛒 My Cart</h2>

<!-- PRODUCTS -->
<div id="cart-items"></div>

<!-- COUPON SECTION -->
<div class="coupon-section">

  <!-- INPUT -->
  <div class="coupon-box">
    <input type="text" id="coupon-input" placeholder="Apply Coupon Code">
    <button onclick="applyCoupon()">Apply</button>
  </div>

  <!-- VIEW COUPONS -->
  <button onclick="toggleCoupons()" class="view-coupon-btn">
    🎁 View Coupons
  </button>

  <!-- COUPON LIST -->
  <div id="coupon-list" class="coupon-list" style="display:none;">

    <div class="coupon-card" onclick="applyCouponCode('RRANDO123')">
      <h4>RRANDO123</h4>
      <p>20% OFF 💸</p>
    </div>

    <div class="coupon-card" onclick="applyCouponCode('NEWUSER09')">
      <h4>NEWUSER09</h4>
      <p>Free Delivery 🚚</p>
    </div>

  </div>

  <!-- APPLIED COUPON -->
  <p id="applied-coupon" class="applied-text"></p>
</div>

  <!-- 7/4/26 -->
  <h3>You might also like ❤️</h3>
  <div id="recommended-products"></div>
  
<div id="offer-progress" style="margin:10px 0;">
  <div style="background:#eee; height:10px; border-radius:5px;">
    <div id="progress-bar" style="height:10px; width:0%; background:green; border-radius:5px;"></div>
  </div>
  <p id="progress-text" style="font-size:14px;"></p>
</div>

<!-- TOTAL + CHECKOUT -->
<div class="cart-summary">
  <h3 id="total-price">Total: ₹0</h3>

  <button class="checkout-btn" onclick="proceedCheckout()">
    Proceed to Checkout
  </button>
</div>


</div>

<script src="script.js"></script>

</body>
